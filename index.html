<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
            margin-bottom: 25px;
            width: 100%;
        }

        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #cccccc !important;
            color: #666666;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            color: #444;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
        }

        .probability {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }
        
        .status-msg {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" id="start-btn" onclick="init()">เปิดใช้งานระบบ (วิเคราะห์ทุก 3 วินาที)</button>
    <div id="status-text" class="status-msg">กดปุ่มด้านบนเพื่อเริ่มต้น</div>
    <div id="webcam-container">กล้องปิดอยู่</div>
    <div id="label-container"></div>
</div>

<!-- กลับมาใช้ชุด Script ทางการของ Google ที่สามารถทำงานร่วมกับโครงสร้างเว็บแคมเดิมได้ร้อยเปอร์เซ็นต์ -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณจากระบบ Teachable Machine
    const URL = "https://teachablemachine.withgoogle.com/models/6zKJgPS1_/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    async function init() {
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status-text");
        
        startBtn.disabled = true;
        startBtn.innerText = "กำลังเริ่มต้น...";
        statusText.innerText = "1. กำลังโหลดโมเดล AI...";

        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // 1. โหลดโมเดลก่อน
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            statusText.innerText = "2. กำลังเปิดกล้องเว็บแคม...";

            // 2. ตั้งค่าและเปิดใช้งานกล้อง
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            // นำหน้าจอกล้องไปฝังบนเว็บแทนที่ตัวอักษรบอกสถานะเก่า
            const webcamBox = document.getElementById("webcam-container");
            webcamBox.innerHTML = "";
            webcamBox.appendChild(webcam.canvas);

            // 3. จัดเตรียมพื้นที่แสดงผลลัพธ์การทำนาย
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const itemDiv = document.createElement("div");
                itemDiv.className = "prediction-item";
                itemDiv.innerHTML = `<span class="class-name">รอการประมวลผล...</span><span class="probability">0%</span>`;
                labelContainer.appendChild(itemDiv);
            }

            statusText.innerText = "ระบบเริ่มวิเคราะห์ภาพทุก ๆ 3 วินาทีเรียบร้อย";
            startBtn.innerText = "กำลังทำงาน (ทายผลทุก 3 วิ)";

            // เริ่มทำการหน่วงเวลาเพื่อวิเคราะห์ภาพและรีเฟรชกล้องทุก 3 วินาที
            predictInterval = setInterval(updateAndPredict, 3000);
            
            // รันทำนายผลทันทีในครั้งแรกสุด
            updateAndPredict();

        } catch (error) {
            console.error(error);
            alert("ไม่สามารถเปิดระบบได้ เนื่องจาก: " + error.message);
            startBtn.disabled = false;
            startBtn.innerText = "ลองใหม่อีกครั้ง";
            statusText.innerText = "เกิดข้อผิดพลาดในการรันระบบ";
        }
    }

    // ฟังก์ชันรันกล้องและสั่งทำนายผลลัพธ์
    async function updateAndPredict() {
        if (webcam && model) {
            webcam.update(); // ดึงภาพนิ่งเฟรมปัจจุบันจากหน้ากล้องเว็บแคม
            await predict(); // ส่งไปให้ตัว AI ประมวลผลลัพธ์
        }
    }

    // ฟังก์ชันการทำนายแยกประเภท
    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            const item = labelContainer.childNodes[i];
            if (item) {
                item.querySelector(".class-name").innerText = className;
                item.querySelector(".probability").innerText = probability;
            }
        }
    }
</script>
</body>
</html>
