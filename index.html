<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
            margin-bottom: 25px;
            width: 100%;
        }

        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #cccccc !important;
            color: #666666;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            color: #444;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
            text-transform: uppercase;
        }

        .probability {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }
        
        .status-msg {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <!-- เปลี่ยนโครงสร้างปุ่มกดแก้ปัญหาบล็อกสิทธิ์บน GitHub Pages -->
    <button type="button" id="start-btn">Start Camera</button>
    <div id="status-text" class="status-msg">กดปุ่มด้านบนเพื่อเริ่มต้นระบบวิเคราะห์</div>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>[cite: 1]
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>[cite: 1]
<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine เดิม[cite: 1]
    const URL = "https://teachablemachine.withgoogle.com/models/6zKJgPS1_/";[cite: 1]

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    // เปลี่ยนมาใช้การผูก Event เพื่อให้ GitHub ยอมรับและยอมให้ปุ่มทำงานได้
    document.getElementById("start-btn").addEventListener("click", init);

    async function init() {
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status-text");
        
        startBtn.disabled = true;
        startBtn.innerText = "Loading Model...";
        statusText.innerText = "กำลังดาวน์โหลดไฟล์โมเดล AI...";

        try {
            const modelURL = URL + "model.json";[cite: 1]
            const metadataURL = URL + "metadata.json";[cite: 1]

            // โหลดโมเดลจริงตามโค้ดเดิมของคุณ[cite: 1]
            model = await tmImage.load(modelURL, metadataURL);[cite: 1]
            maxPredictions = model.getTotalClasses();[cite: 1]

            statusText.innerText = "กำลังเชื่อมต่อกล้องเว็บแคม...";

            // เรียกตั้งค่ากล้องเว็บแคมจากระบบ Teachable Machine[cite: 1]
            const flip = true;[cite: 1]
            webcam = new tmImage.Webcam(200, 200, flip);[cite: 1]
            await webcam.setup();[cite: 1]
            await webcam.play();[cite: 1]

            // แสดงหน้าจอกล้อง
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
            labelContainer = document.getElementById("label-container");[cite: 1]
            
            // สร้างพื้นที่เตรียมแสดงผลลัพธ์
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {[cite: 1]
                const itemDiv = document.createElement("div");
                itemDiv.className = "prediction-item";
                itemDiv.innerHTML = `<span class="class-name">รอการประมวลผล...</span><span class="probability">0%</span>`;
                labelContainer.appendChild(itemDiv);[cite: 1]
            }

            statusText.innerText = "ระบบสแกนภาพทุก ๆ 3 วินาทีเปิดใช้งานแล้ว";
            startBtn.innerText = "Running...";

            // เรียกการทำงานรอบแรกทันที
            updateAndPredict();

            // เปลี่ยนจาก ลูปสตรีมต่อเนื่อง มาเป็นเรียกคำสั่งอัปเดตกล้องและทำนายผล "ทุกๆ 3 วินาที" ตามเงื่อนไขคุณครับ
            predictInterval = setInterval(updateAndPredict, 3000);

        } catch (error) {
            console.error(error);
            alert("ไม่สามารถเปิดใช้งานกล้องได้: " + error.message + "\n\nคำแนะนำ: กรุณาคลิกเลือกรูปแม่กุญแจที่มุมบนหน้าเว็บเพื่อกดยอมรับสิทธิ์เปิดกล้องนะครับ");
            startBtn.disabled = false;
            startBtn.innerText = "Try Again";
            statusText.innerText = "เกิดข้อผิดพลาดในการรันระบบ";
        }
    }

    // ฟังก์ชันอัปเดตภาพจากเว็บแคมและทำการทำนาย
    async function updateAndPredict() {
        if (webcam) {
            webcam.update(); // อัปเดตเฟรมภาพปัจจุบันจากกล้อง[cite: 1]
            await predict(); // ทำนายผล[cite: 1]
        }
    }

    // ฟังก์ชันเรียก AI คํานวณแยกประเภทจริง
    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const className = prediction[i].className;[cite: 1]
            // แปลงค่าจากทศนิยม 0.00 เป็นเปอร์เซ็นต์ให้ดูสวยงามและเข้าใจง่าย
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            const item = labelContainer.childNodes[i];
            if (item) {
                item.querySelector(".class-name").innerText = className;
                item.querySelector(".probability").innerText = probability;
            }
        }
    }
</script>
</body>
</html>
