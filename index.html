<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
            margin-bottom: 25px;
        }

        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            color: #444;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
        }

        .probability {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" id="start-btn" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine
    const URL = "https://teachablemachine.withgoogle.com/models/6zKJgPS1_/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    // โหลดโมเดลและตั้งค่ากล้อง
    async function init() {
        // ซ่อนหรือเปลี่ยนสถานะปุ่มหลังจากกดเพื่อป้องกันการกดซ้ำ
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerText = "Loading...";
        startBtn.style.backgroundColor = "#cccccc";
        startBtn.style.boxShadow = "none";

        const modelURL = URL + "model.json";[cite: 1]
        const metadataURL = URL + "metadata.json";[cite: 1]

        // โหลดโมเดล[cite: 1]
        model = await tmImage.load(modelURL, metadataURL);[cite: 1]
        maxPredictions = model.getTotalClasses();[cite: 1]

        // ตั้งค่ากล้องเว็บแคม[cite: 1]
        const flip = true;[cite: 1]
        webcam = new tmImage.Webcam(200, 200, flip);[cite: 1]
        await webcam.setup();[cite: 1]
        await webcam.play();[cite: 1]

        // ใส่หน้าจอกล้องลงใน HTML[cite: 1]
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
        labelContainer = document.getElementById("label-container");[cite: 1]
        
        // สร้างพื้นที่แสดงผลลัพธ์แบบสวยงาม
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const itemDiv = document.createElement("div");
            itemDiv.className = "prediction-item";
            
            const nameSpan = document.createElement("span");
            nameSpan.className = "class-name";
            
            const probSpan = document.createElement("span");
            probSpan.className = "probability";
            
            itemDiv.appendChild(nameSpan);
            itemDiv.appendChild(probSpan);
            labelContainer.appendChild(itemDiv);[cite: 1]
        }

        startBtn.innerText = "Running...";

        // รันฟังก์ชันทำนายผลครั้งแรกทันที
        updateAndPredict();

        // ตั้งเวลาให้คอยอัปเดตกล้องและทำนายผลทุกๆ 3 วินาที (3000 มิลลิวินาที)
        predictInterval = setInterval(updateAndPredict, 3000);
    }

    // ฟังก์ชันอัปเดตเฟรมภาพจากกล้องและส่งไปทำนายผล
    async function updateAndPredict() {
        if (webcam) {
            webcam.update(); // อัปเดตเฟรมภาพปัจจุบันจากกล้องเว็บแคม[cite: 1]
            await predict(); // เรียกฟังก์ชันทำนายผล[cite: 1]
        }
    }

    // ฟังก์ชันทำนายผล[cite: 1]
    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const className = prediction[i].className;[cite: 1]
            const probability = (prediction[i].probability * 100).toFixed(0) + "%"; // ปรับแสดงผลเป็นเปอร์เซ็นต์ให้อ่านง่ายขึ้น
            
            // อัปเดตข้อมูลลงในโครงสร้าง UI ใหม่
            const item = labelContainer.childNodes[i];
            item.querySelector(".class-name").innerText = className;
            item.querySelector(".probability").innerText = probability;
        }
    }
</script>
</body>
</html>
