<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
            margin-bottom: 25px;
        }

        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        button:disabled {
            background-color: #cccccc !important;
            color: #666666;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        #error-message {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
            text-align: left;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            color: #444;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
        }

        .probability {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <div id="error-message"></div>
    <button type="button" id="start-btn" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine
    const URL = "https://teachablemachine.withgoogle.com/models/6zKJgPS1_/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    function showError(message) {
        const errorDiv = document.getElementById("error-message");
        errorDiv.innerText = message;
        errorDiv.style.display = "block";
    }

    async function init() {
        const startBtn = document.getElementById("start-btn");
        const errorDiv = document.getElementById("error-message");
        
        // ล้างข้อผิดพลาดเดิม (ถ้ามี)
        errorDiv.style.display = "none";
        startBtn.disabled = true;
        startBtn.innerText = "Connecting Camera...";

        try {
            // 1. ตั้งค่าและเปิดกล้องเว็บแคมก่อนเลย เพื่อเช็กสิทธิ์เข้าถึง
            const flip = true;
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup(); // ขอสิทธิ์เข้าถึงกล้องตรงนี้
            await webcam.play();
            
            // แสดงหน้าจอกล้องบนเว็บทันทีที่เปิดได้
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            // 2. โหลดโมเดล AI
            startBtn.innerText = "Loading AI Model...";
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 3. เตรียมพื้นที่แสดงผลลัพธ์
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // ล้างข้อมูลเก่า
            
            for (let i = 0; i < maxPredictions; i++) {
                const itemDiv = document.createElement("div");
                itemDiv.className = "prediction-item";
                
                const nameSpan = document.createElement("span");
                nameSpan.className = "class-name";
                nameSpan.innerText = "Waiting...";
                
                const probSpan = document.createElement("span");
                probSpan.className = "probability";
                probSpan.innerText = "0%";
                
                itemDiv.appendChild(nameSpan);
                itemDiv.appendChild(probSpan);
                labelContainer.appendChild(itemDiv);
            }

            startBtn.innerText = "Running (Every 3s)";
            
            // ทำนายผลครั้งแรก
            updateAndPredict();

            // ตั้งให้ทายผลและอัปเดตกล้องทุกๆ 3 วินาที
            predictInterval = setInterval(updateAndPredict, 3000);

        } catch (error) {
            console.error(error);
            startBtn.disabled = false;
            startBtn.innerText = "Try Again";
            
            // แจ้งเตือนข้อผิดพลาดตามจริงเพื่อให้คุณแก้ไขได้ง่ายขึ้น
            if (error.name === "NotAllowedError" || error.message.includes("permission")) {
                showError("❌ ไม่สามารถเข้าถึงกล้องได้: กรุณากดปุ่ม 'อนุญาต (Allow)' ให้เว็บใช้กล้องที่บริเวณมุมบนของเบราว์เซอร์");
            } else if (window.location.protocol === "file:") {
                showError("❌ บล็อกความปลอดภัย: การเปิดไฟล์ในเครื่องตรงๆ อาจทำให้กล้องใช้งานไม่ได้ แนะนำให้คลิกขวาที่ไฟล์แล้วเลือกเปิดด้วยเบราว์เซอร์อื่น หรือเปิดผ่านส่วนเสริม Live Server");
            } else {
                showError("❌ เกิดข้อผิดพลาด: " + error.message);
            }
        }
    }

    async function updateAndPredict() {
        if (webcam && model) {
            webcam.update(); // ดึงภาพเฟรมปัจจุบันจากกล้อง
            await predict(); // ส่งภาพไปให้ AI ประมวลผล
        }
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            const item = labelContainer.childNodes[i];
            if (item) {
                item.querySelector(".class-name").innerText = className;
                item.querySelector(".probability").innerText = probability;
            }
        }
    }
</script>
</body>
</html>
