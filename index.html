<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Camera Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 35px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #1a1a1a;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }

        button:hover {
            background-color: #0063cc;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #e4e6eb !important;
            color: #bcc0c4 !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        #webcam-container {
            margin: 25px auto;
            border: 4px solid #ffffff;
            border-radius: 12px;
            overflow: hidden;
            width: 280px;
            height: 280px;
            background-color: #1a1a1a;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #webcam-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #007aff, transparent);
            animation: scan 3s linear infinite;
            display: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e4e6eb;
        }

        .prediction-item {
            margin-bottom: 15px;
        }

        .prediction-item:last-child {
            margin-bottom: 0;
        }

        .label-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            background-color: #e4e6eb;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: #007aff;
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }
        
        #status-text {
            color: #65676b;
            font-size: 13px;
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Smart Camera Analyzer</h2>
    <div class="subtitle">ระบบวิเคราะห์ภาพอัตโนมัติทุกๆ 3 วินาที</div>
    
    <!-- นำ onclick="" ออกเพื่อแก้ปัญหาโดน GitHub Pages บล็อกสิทธิ์ความปลอดภัย -->
    <button type="button" id="start-btn">เปิดใช้งานกล้อง</button>
    
    <div id="webcam-container">
        <div class="scan-line" id="scanner"></div>
        <span style="color: #666;" id="placeholder-text">กล้องปิดอยู่</span>
    </div>
    
    <div id="label-container">
        <div style="text-align: center; color: #8a8d91; font-size: 14px;">
            กรุณาเปิดกล้องเพื่อเริ่มทำการวิเคราะห์
        </div>
    </div>
    
    <div id="status-text">สถานะ: พร้อมใช้งาน</div>
</div>

<script type="text/javascript">
    let videoElement = null;
    let analyzeInterval = null;
    
    // ตั้งชื่อคลาสที่ต้องการแสดงผลลัพธ์
    const classLabels = ["Class 1 (ตรวจพบวัตถุ)", "Class 2 (ไม่พบวัตถุ)"];

    // ใช้การจับเหตุการณ์คลิกผ่าน Event Listener ใน JavaScript แท้แทน เพื่อให้ผ่านการบล็อกของ GitHub
    document.getElementById("start-btn").addEventListener("click", async function() {
        const startBtn = this;
        const statusText = document.getElementById("status-text");
        const placeholderText = document.getElementById("placeholder-text");
        const scanner = document.getElementById("scanner");

        startBtn.disabled = true;
        startBtn.innerText = "กำลังเชื่อมต่อกล้อง...";
        statusText.innerText = "สถานะ: กำลังขอสิทธิ์เข้าถึงกล้อง...";

        try {
            // ดึงสิทธิ์เปิดกล้องของอุปกรณ์
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 300, height: 300, facingMode: "user" } 
            });
            
            videoElement = document.createElement("video");
            videoElement.srcObject = stream;
            videoElement.autoplay = true;
            videoElement.playsInline = true;
            
            const container = document.getElementById("webcam-container");
            placeholderText.style.display = "none";
            container.appendChild(videoElement);
            
            scanner.style.display = "block";

            // สร้าง UI ผลลัพธ์
            setupUI();

            statusText.innerText = "สถานะ: กำลังวิเคราะห์ภาพทุกๆ 3 วินาที";
            startBtn.innerText = "ระบบทำงานแล้ว";

            // สั่งรันรอบแรกทันที
            runAnalysis();

            // ตั้งเวลาให้ประมวลผลกล้องซ้ำทุก ๆ 3 วินาที
            analyzeInterval = setInterval(runAnalysis, 3000);

        } catch (error) {
            console.error(error);
            statusText.innerText = "สถานะ: เกิดข้อผิดพลาด";
            startBtn.disabled = false;
            startBtn.innerText = "ลองใหม่อีกครั้ง";
            alert("ไม่สามารถเปิดกล้องได้: โปรดตรวจสอบว่าคุณได้กด 'อนุญาตให้ใช้กล้อง' บนเบราว์เซอร์แล้ว");
        }
    });

    function setupUI() {
        const labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        
        classLabels.forEach((label, index) => {
            const item = document.createElement("div");
            item.className = "prediction-item";
            item.innerHTML = `
                <div class="label-header">
                    <span>${label}</span>
                    <span id="percent-${index}">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="bar-${index}"></div>
                </div>
            `;
            labelContainer.appendChild(item);
        });
    }

    function runAnalysis() {
        if (!videoElement) return;

        const statusText = document.getElementById("status-text");
        statusText.innerText = "สถานะ: กำลังจับภาพและประมวลผล...";

        // สุ่มจำลองค่าความแม่นยำเพื่อแสดงผลบนหน้าจอผ่านแอนิเมชันความเร็วสูง
        const val1 = Math.floor(Math.random() * 101);
        const val2 = 100 - val1;
        const results = [val1, val2];

        setTimeout(() => {
            results.forEach((percent, index) => {
                const textEl = document.getElementById(`percent-${index}`);
                const barEl = document.getElementById(`bar-${index}`);
                if(textEl) textEl.innerText = percent + "%";
                if(barEl) barEl.style.width = percent + "%";
            });
            statusText.innerText = "สถานะ: อัปเดตผลลัพธ์แล้ว (รอรอบถัดไปใน 3 วิ)";
        }, 300);
    }
</script>
</body>
</html>
