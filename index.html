<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
            margin-bottom: 25px;
            width: 100%;
        }

        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #cccccc !important;
            color: #666666;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* สลับซ้ายขวาให้เหมือนกระจกเงา */
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            color: #444;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
        }

        .probability {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }
        
        .status-msg {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" id="start-btn" onclick="init()">เปิดใช้งานระบบ (วิเคราะห์ทุก 3 วินาที)</button>
    <div id="status-text" class="status-msg">กดปุ่มด้านบนเพื่อเริ่มต้น</div>
    <div id="webcam-container">กล้องปิดอยู่</div>
    <div id="label-container"></div>
</div>

<!-- โหลด TensorFlow ตัวหลัก ส่วนตัว image ย้ายมารันใน script ป้องกันการบล็อกจาก CDN -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/6zKJgPS1_/";
    let model, videoElement, labelContainer, maxPredictions;

    async function init() {
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status-text");
        
        startBtn.disabled = true;
        startBtn.innerText = "กำลังเริ่มต้น...";
        statusText.innerText = "1. กำลังโหลดโมเดล AI...";

        try {
            // โหลดโมเดลโดยตรงผ่านกลไกของ TensorFlow Layer 
            // วิธีนี้จะไม่เรียกใช้ tmImage เพื่อเลี่ยงปัญหา Error ตัวแปรไม่รู้จัก
            const response = await fetch(URL + "metadata.json");
            const metadata = await response.json();
            
            // โหลดโมเดลโครงข่ายประสาทเทียม
            model = await tf.loadLayersModel(URL + "model.json");
            maxPredictions = metadata.classes.length;

            statusText.innerText = "2. กำลังเปิดกล้องเว็บแคม...";

            // เรียกใช้สิทธิ์ระบบกล้องมาตรฐานของเบราว์เซอร์
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 200, height: 200 } });
            
            videoElement = document.createElement("video");
            videoElement.srcObject = stream;
            videoElement.autoplay = true;
            videoElement.playsInline = true;

            const webcamBox = document.getElementById("webcam-container");
            webcamBox.innerHTML = "";
            webcamBox.appendChild(videoElement);

            // เตรียมพื้นที่แสดงผลลัพธ์
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const itemDiv = document.createElement("div");
                itemDiv.className = "prediction-item";
                itemDiv.innerHTML = `<span class="class-name">${metadata.classes[i]}</span><span class="probability" id="prob-${i}">0%</span>`;
                labelContainer.appendChild(itemDiv);
            }

            statusText.innerText = "ระบบวิเคราะห์ภาพทุก ๆ 3 วินาทีเรียบร้อย";
            startBtn.innerText = "กำลังทำงาน...";

            // ทำการวิเคราะห์ข้อมูลและเรียกใช้กล้องส่งต่อไปทายผลทุกๆ 3 วินาที
            setInterval(predict, 3000);
            predict(); // รันทันทีรอบแรก

        } catch (error) {
            console.error(error);
            alert("เกิดข้อผิดพลาด: " + error.message);
            startBtn.disabled = false;
            startBtn.innerText = "ลองใหม่อีกครั้ง";
        }
    }

    // ฟังก์ชันทำนายผลลัพธ์แบบ Custom ไร้การพึ่งพาโมดูลนอก
    async function predict() {
        if (!model || !videoElement) return;

        tf.tidy(() => {
            // แปลงภาพจากวิดีโอกล้องเว็บแคมให้กลายเป็น Tensor ที่ AI เข้าใจ
            let img = tf.browser.fromPixels(videoElement);
            img = tf.image.resizeBilinear(img, [224, 224]); // ขนาดมาตรฐาน Teachable Machine
            img = img.expandDims(0).toFloat().div(127.5).sub(1); // Normalization

            // ส่งให้โมเดลทำนายผลลัพธ์ออกมา
            const out = model.predict(img);
            const predictions = out.dataSync();

            // อัปเดตข้อมูลขึ้นหน้าจอ
            for (let i = 0; i < maxPredictions; i++) {
                const probPercent = (predictions[i] * 100).toFixed(0) + "%";
                const probSpan = document.getElementById(`prob-${i}`);
                if (probSpan) {
                    probSpan.innerText = probPercent;
                }
            }
        });
    }
</script>
</body>
</html>
