<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
            margin-bottom: 25px;
            width: 100%;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #cccccc !important;
            color: #666666;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        #webcam-box {
            margin: 20px auto;
            border: 4px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 14px;
        }

        #webcam-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            color: #444;
        }

        .class-name {
            font-weight: 600;
        }

        .probability {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }
        
        .status-msg {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" id="start-btn">เปิดใช้งานกล้อง (ทายผลทุก 3 วิ)</button>
    <div id="status-text" class="status-msg">กดปุ่มด้านบนเพื่อเริ่มต้น</div>
    <div id="webcam-box">ปิดอยู่</div>
    <div id="label-container"></div>
</div>

<!-- โหลดไลบรารีผ่านช่องทางสำรองที่เสถียรและรองรับการรันจากไฟล์เครื่อง -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/3.18.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@1.1.2/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณ
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/6zKJgPS1_/";

    let model, webcam, labelContainer, maxPredictions;
    let isRunning = false;

    // ผูกเหตุการณ์คลิกด้วยคำสั่งภายนอกเพื่อไม่ให้ติดบล็อก Inline
    document.getElementById("start-btn").addEventListener("click", startProcess);

    async function startProcess() {
        if (isRunning) return;
        
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status-text");
        
        startBtn.disabled = true;
        startBtn.innerText = "กำลังทำงาน...";
        statusText.innerText = "1. กำลังเชื่อมต่อกล้องเว็บแคม...";

        try {
            // โครงสร้างมาตรฐานเบราว์เซอร์ในการเรียกใช้กล้องโดยตรง ไม่ผ่านโมดูลย่อย
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 200, height: 200 } });
            
            const webcamBox = document.getElementById("webcam-box");
            webcamBox.innerHTML = ""; // ล้างข้อความเก่า
            
            const videoElement = document.createElement("video");
            videoElement.srcObject = stream;
            videoElement.autoplay = true;
            videoElement.playsInline = true;
            webcamBox.appendChild(videoElement);

            statusText.innerText = "2. กำลังดาวน์โหลดโมเดล AI...";
            
            // โหลดโมเดล
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // เตรียมพื้นที่แสดงข้อความทายผล
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const itemDiv = document.createElement("div");
                itemDiv.className = "prediction-item";
                itemDiv.innerHTML = `<span class="class-name">รอการประมวลผล...</span><span class="probability">0%</span>`;
                labelContainer.appendChild(itemDiv);
            }

            statusText.innerText = "ระบบกำลังวิเคราะห์ภาพทุก ๆ 3 วินาที";
            isRunning = true;

            // รันการทำนายผลทันที
            predict(videoElement);

            // ตั้งให้ทำงานทุก ๆ 3 วินาที (3000 มิลลิวินาที)
            setInterval(() => {
                predict(videoElement);
            }, 3000);

        } catch (error) {
            console.error(error);
            alert("ไม่สามารถเปิดระบบได้ เนื่องจาก: " + error.message + "\n\nคำแนะนำ: กรุณาคลิกขวาที่ไฟล์นี้แล้วเลือกเปิดด้วย Google Chrome หรือ Microsoft Edge แล้วอย่าลืมกดอนุญาตให้ใช้กล้องนะครับ");
            startBtn.disabled = false;
            startBtn.innerText = "ลองใหม่อีกครั้ง";
            statusText.innerText = "เกิดข้อผิดพลาดในการเริ่มต้น";
        }
    }

    async function predict(videoEl) {
        if (!model) return;
        
        // ใช้ตัววิดีโอหลักในการทายผลตรงๆ เพื่อตัดปัญหาความหน่วงของ Canvas
        const prediction = await model.predict(videoEl);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            const item = labelContainer.childNodes[i];
            if (item) {
                item.querySelector(".class-name").innerText = className;
                item.querySelector(".probability").innerText = probability;
            }
        }
    }
</script>
</body>
</html>
